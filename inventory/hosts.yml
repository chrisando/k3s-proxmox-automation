---
# Ansible inventory for the k3s cluster.
# Update ansible_host to match your actual VM IPs.
# These values should match what you configured in terraform.tfvars.

all:
  vars:
    ansible_user: cw
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3

  children:
    k3s_cluster:
      children:
        k3s_controller:
          hosts:
            k3s-controller-01:
              ansible_host: 172.16.10.1

        k3s_workers:
          hosts:
            k3s-worker-01:
              ansible_host: 172.16.10.2
            k3s-worker-02:
              ansible_host: 172.16.10.3
            k3s-worker-03:
              ansible_host: 172.16.10.4
