---
# site.yml — Full cluster provisioning playbook.
# Run order: common → k3s_server → cilium → k3s_agent

# ── 1. Baseline configuration on all nodes ────────────────────────────────────
- name: Apply common configuration to all nodes
  hosts: k3s_cluster
  gather_facts: true
  tags: [common]
  roles:
    - common

# ── 2. Install k3s server on controller ──────────────────────────────────────
- name: Install k3s server
  hosts: k3s_controller
  gather_facts: true
  tags: [k3s_server]
  roles:
    - k3s_server

# ── 3. Install Cilium CNI (runs once on the controller) ──────────────────────
- name: Install Cilium CNI
  hosts: k3s_controller
  gather_facts: true
  tags: [cilium]
  roles:
    - cilium

# ── 4. Install k3s agents on workers ─────────────────────────────────────────
- name: Install k3s agents on workers
  hosts: k3s_workers
  gather_facts: true
  tags: [k3s_agent]
  roles:
    - k3s_agent

# ── 5. Bootstrap ArgoCD and deploy Argo suite ────────────────────────────────
- name: Bootstrap ArgoCD and Argo suite via GitOps
  hosts: k3s_controller
  gather_facts: false
  tags: [argocd]
  roles:
    - argocd
