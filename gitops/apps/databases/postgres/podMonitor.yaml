apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pgc1-pod-monitor
  namespace: monitoring
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: pgc1
  podMetricsEndpoints:
    - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cnpg-controller-manager
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  podMetricsEndpoints:
    - port: metrics
