# Keycloak Operator — installs the official CRDs and operator controller.
# Must sync before keycloak-app (wave 1) so the Keycloak CR is recognised.
# Source: https://github.com/keycloak/keycloak-k8s-resources
#   kubernetes/keycloaks.k8s.keycloak.org-v1.yml     — Keycloak CRD
#   kubernetes/keycloakrealmimports.k8s.keycloak.org-v1.yml — KeycloakRealmImport CRD
#   kubernetes/kubernetes.yml                          — operator Deployment + RBAC
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/keycloak/keycloak-k8s-resources
    targetRevision: 26.2.5
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: false   # never auto-prune CRDs
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true  # CRDs must be replaced, not patched
