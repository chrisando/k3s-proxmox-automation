# Shared secrets — SealedSecrets that span multiple namespaces.
# Manages: cloudflare-token-secret (→ cert-manager ns),
#          dbcreds, pgc1-pgadmin4, pgc1-superuser, dbcreds-arr (→ homelab ns),
#          blobstorage (→ cnpg-system ns).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://git.wagner.org.za/homelab/k3s-ansible.git
    targetRevision: HEAD
    path: gitops/apps/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
