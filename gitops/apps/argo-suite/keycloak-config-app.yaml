# Keycloak configuration — secrets and SSO client credentials.
# Manages: keycloak-postgres-secret, keycloak-admin-secret (→ keycloak ns),
#          argo-workflows-sso (→ argo ns), grafana-oauth-secret (→ monitoring ns).
# The keycloak DB is provisioned by the shared pgc1 cluster (postgres-app).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://git.wagner.org.za/homelab/k3s-ansible.git
    targetRevision: HEAD
    path: gitops/apps/keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
