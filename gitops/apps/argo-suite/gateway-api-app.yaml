# Gateway API CRDs Application.
# Installs the experimental channel Gateway API CRDs (required by cert-manager
# with enableGatewayAPI: true, and for future Gateway/HTTPRoute resources).
# Uses the upstream kubernetes-sigs repo with Kustomize — no Helm chart needed.
# Sync this before cert-manager to avoid CRD-not-found errors on startup.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Ensure Gateway API CRDs are synced before cert-manager
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api
    targetRevision: v1.5.0
    path: config/crd/experimental
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Replace=true # CRDs must be replaced, not patched
