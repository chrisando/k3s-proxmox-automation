# Longhorn v2 — distributed block storage with replication.
# Provides replicated PVCs across worker nodes.
# Requires open-iscsi and nfs-common (installed by Ansible common role).
# Data path: /var/lib/longhorn, backed by a dedicated 512 GB XFS disk (/dev/vdc)
# pre-formatted and mounted by the Ansible common role on each worker.
# UI: accessible at longhorn.apps.wagner.org.za (add HTTPRoute in gitops/networking/).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: "1.11.0"
    helm:
      values: |
        defaultSettings:
          defaultDataPath: /var/lib/longhorn
          defaultReplicaCount: 2        # survives one worker failure (3 workers total)
          replicaSoftAntiAffinity: true # allow multiple replicas on same node if needed
          storageOverProvisioningPercentage: 200
          storageMinimalAvailablePercentage: 10

        persistence:
          defaultClass: true
          defaultClassReplicaCount: 2
          defaultFsType: ext4
          reclaimPolicy: Delete

        ingress:
          enabled: false    # expose via Gateway API HTTPRoute instead

        longhornUI:
          replicas: 1

        longhornManager:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"

        longhornDriver:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
