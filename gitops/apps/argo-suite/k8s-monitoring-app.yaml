# k8s-monitoring Application.
# Deploys Grafana Alloy as the collector agent — scrapes metrics, tails pod logs,
# and ships cluster events to the local Prometheus and Loki instances.
# sync-wave 1: waits for kube-prometheus-stack and loki to be running first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: k8s-monitoring
    targetRevision: "*"
    helm:
      values: |
        cluster:
          name: k3s-homelab

        # ── Destinations ──────────────────────────────────────────────────────
        destinations:
          - name: localPrometheus
            type: prometheus
            url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write

          - name: localLoki
            type: loki
            url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

        # ── Collection ────────────────────────────────────────────────────────
        clusterMetrics:
          enabled: true
          destinations:
            - localPrometheus

        clusterEvents:
          enabled: true
          destinations:
            - localLoki

        podLogs:
          enabled: true
          destinations:
            - localLoki

        # ── Alloy (collector agent) ───────────────────────────────────────────
        alloy-metrics:
          enabled: true
        alloy-logs:
          enabled: true
        alloy-events:
          enabled: true

        # Disable Grafana / Prometheus sub-charts — managed by kube-prometheus-stack
        grafana:
          enabled: false
        prometheus:
          enabled: false
        loki:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
