# CiliumBGPPeerConfig — reusable peer settings referenced by CiliumBGPClusterConfig.
# Defines timers, graceful restart, and which address families to negotiate.
# The advertisements selector links to CiliumBGPAdvertisement objects by label.
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeerConfig
metadata:
  name: bgp-peer-config
spec:
  transport:
    peerPort: 179

  timers:
    connectRetryTimeSeconds: 120
    holdTimeSeconds: 90
    keepAliveTimeSeconds: 30

  gracefulRestart:
    enabled: true
    restartTimeSeconds: 120

  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
