# HTTPRoute — ArgoCD UI
# Placed in the argocd namespace so the backend reference requires no ReferenceGrant.
# Gateway allows routes from all namespaces, so this attaches cleanly.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - argocd.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
