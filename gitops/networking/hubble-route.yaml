# HTTPRoute — Hubble UI
# Routes hubble.apps.wagner.org.za → hubble-ui service in kube-system.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble
  namespace: kube-system
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - hubble.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: hubble-ui
          port: 80
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
