# HTTPRoute — Keycloak identity provider.
# Lives in the keycloak namespace alongside its backend service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - sso.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: keycloak-service
          port: 8080
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
