# HTTPRoutes — Monitoring UIs
# All placed in monitoring namespace — no ReferenceGrant needed.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - grafana.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - prometheus.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - alertmanager.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
