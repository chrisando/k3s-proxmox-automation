# HTTPRoute — longhorn-system UI
# Placed in the longhorn-system namespace so the backend reference requires no ReferenceGrant.
# Gateway allows routes from all namespaces, so this attaches cleanly.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: gateway
      namespace: kube-system
      sectionName: https
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - longhorn.apps.wagner.org.za
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
          kind: Service
          group: ""
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
