# Gateway — managed via ArgoCD, do not edit manually on the cluster.
# Envoy Gateway implementation with HTTP (redirect) and HTTPS (terminate) listeners.
# Routes from all namespaces are permitted on both listeners.
# TLS certificate wagner-tls must exist in kube-system (use cert-manager + Reflector).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: kube-system
  labels:
    gateway: gateway
spec:
  infrastructure:
    annotations:
      lbipam.cilium.io/ips: "172.16.1.1"
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wagner-tls
            namespace: kube-system
            group: ""
      allowedRoutes:
        namespaces:
          from: All
